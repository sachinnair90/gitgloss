name: Spec to Code

on:
  workflow_dispatch:
    inputs:
      change-name:
        description: "OpenSpec change name to implement"
        required: true
        type: string
      task-range:
        description: "Task range to implement (e.g. 1-5)"
        required: false
        default: "1-5"
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply agent:implementing label
        uses: actions/github-script@v7
        with:
          script: |
            // Ensure the label exists before applying it
            const labels = ['agent:implementing'];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: 'ededed'
                  });
                }
              }
            }

            // The spec-to-code run doesn't operate on an existing issue, so we
            // record the state in the workflow run summary instead. If a tracking
            // issue number is ever passed as an input this block can be extended.
            core.info(`Starting spec-to-code run for change: ${{ inputs.change-name }}, task-range: ${{ inputs.task-range }}`);

      - name: Read implementation prompt
        id: read_prompt
        env:
          CHANGE_NAME: ${{ inputs.change-name }}
          TASK_RANGE: ${{ inputs.task-range }}
        run: |
          PROMPT_FILE="${{ github.workspace }}/.github/agent-prompts/implement.md"
          if [ -f "$PROMPT_FILE" ]; then
            # Substitute CHANGE_NAME and TASK_RANGE into the prompt file before passing to the agent
            {
              echo 'PROMPT_CONTENT<<PROMPT_EOF'
              envsubst '${CHANGE_NAME} ${TASK_RANGE}' < "$PROMPT_FILE"
              echo 'PROMPT_EOF'
            } >> "$GITHUB_ENV"
          else
            echo "PROMPT_CONTENT=Implement the OpenSpec change '${CHANGE_NAME}' tasks '${TASK_RANGE}'. Read openspec/changes/${CHANGE_NAME}/tasks.md, proposal.md, design.md, and all specs/**/*.md. Implement each task in the specified range, check it off in tasks.md, then output TASKS_COMPLETE when done." >> "$GITHUB_ENV"
          fi

      - name: Create or resume agent branch
        env:
          CHANGE_NAME: ${{ inputs.change-name }}
          TASK_RANGE: ${{ inputs.task-range }}
        run: |
          BRANCH="agent/${CHANGE_NAME}/tasks-${TASK_RANGE}"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
          fi

      - name: Run spec-to-code agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.PROMPT_CONTENT }}
          claude_args: "--max-budget-usd 5"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
        env:
          CHANGE_NAME: ${{ inputs.change-name }}
          TASK_RANGE: ${{ inputs.task-range }}

      - name: Create PR and apply label
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGE_NAME: ${{ inputs.change-name }}
          TASK_RANGE: ${{ inputs.task-range }}
        run: |
          BRANCH="agent/${CHANGE_NAME}/tasks-${TASK_RANGE}"

          # Create PR if one doesn't already exist for this branch
          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "feat(${CHANGE_NAME}): implement tasks ${TASK_RANGE}" \
              --body "Automated implementation of tasks \`${TASK_RANGE}\` for change \`${CHANGE_NAME}\`."
            PR_NUMBER=$(gh pr list \
              --head "$BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "Created PR #${PR_NUMBER}"
          else
            echo "PR #${PR_NUMBER} already exists"
          fi

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "agent:active" || \
              echo "Warning: could not apply agent:active label (label may not exist yet)"
          fi
