name: Spec to Code

on:
  workflow_dispatch:
    inputs:
      change-name:
        description: "OpenSpec change name to implement"
        required: true
        type: string
      task-range:
        description: "Task range to implement (e.g. 1-5)"
        required: false
        default: "1-5"
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply agent:implementing label
        uses: actions/github-script@v7
        with:
          script: |
            // Ensure the label exists before applying it
            const labels = ['agent:implementing'];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: 'ededed'
                  });
                }
              }
            }

            // The spec-to-code run doesn't operate on an existing issue, so we
            // record the state in the workflow run summary instead. If a tracking
            // issue number is ever passed as an input this block can be extended.
            core.info(`Starting spec-to-code run for change: ${{ inputs.change-name }}, task-range: ${{ inputs.task-range }}`);

      - name: Read implementation prompt
        id: read_prompt
        env:
          CHANGE_NAME: ${{ inputs.change-name }}
          TASK_RANGE: ${{ inputs.task-range }}
        run: |
          PROMPT_FILE="${{ github.workspace }}/.github/agent-prompts/implement.md"
          if [ -f "$PROMPT_FILE" ]; then
            # Substitute CHANGE_NAME and TASK_RANGE into the prompt file before passing to the agent
            {
              echo 'PROMPT_CONTENT<<PROMPT_EOF'
              envsubst '${CHANGE_NAME} ${TASK_RANGE}' < "$PROMPT_FILE"
              echo 'PROMPT_EOF'
            } >> "$GITHUB_ENV"
          else
            echo "PROMPT_CONTENT=Implement the OpenSpec change '${CHANGE_NAME}' tasks '${TASK_RANGE}'. Read openspec/changes/${CHANGE_NAME}/tasks.md, proposal.md, design.md, and all specs/**/*.md. Implement each task in the specified range, check it off in tasks.md, then output TASKS_COMPLETE when done." >> "$GITHUB_ENV"
          fi

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude --version

      - name: Install and patch ralph-loop plugin
        run: |
          # Install the plugin from the official marketplace
          claude plugin marketplace add https://github.com/anthropics/claude-plugins-official.git
          claude plugin install ralph-loop

          # Locate the installed command file (path includes a commit hash subdirectory)
          PLUGIN_CMD=$(find ~/.claude -name "ralph-loop.md" -path "*/commands/*" 2>/dev/null | head -1)
          if [ -z "$PLUGIN_CMD" ]; then
            echo "ERROR: ralph-loop.md not found after installation"
            exit 1
          fi
          echo "Patching: $PLUGIN_CMD"

          # Overwrite with fixed version — replaces the broken ```! block with a plain Bash() call
          # See: https://github.com/anthropics/claude-code/issues/16398
          cat > "$PLUGIN_CMD" << 'PATCH_EOF'
---
description: "Start Ralph Loop in current session"
argument-hint: "PROMPT [--max-iterations N] [--completion-promise TEXT]"
allowed-tools: ["Bash(${CLAUDE_PLUGIN_ROOT}/scripts/setup-ralph-loop.sh:*)"]
hide-from-slash-command-tool: "true"
---

# Ralph Loop Command

Execute the setup script to initialize the Ralph loop:

Bash("${CLAUDE_PLUGIN_ROOT}/scripts/setup-ralph-loop.sh" $ARGUMENTS)

Please work on the task. When you try to exit, the Ralph loop will feed the SAME PROMPT back to you for the next iteration. You'll see your previous work in files and git history, allowing you to iterate and improve.

CRITICAL RULE: If a completion promise is set, you may ONLY output it when the statement is completely and unequivocally TRUE. Do not output false promises to escape the loop, even if you think you're stuck or should exit for other reasons. The loop is designed to continue until genuine completion.
PATCH_EOF
          echo "Patched ralph-loop.md successfully"

      - name: Run spec-to-code agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.PROMPT_CONTENT }}
          claude_args: "--max-turns 30 --max-budget-usd 5"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
        env:
          CHANGE_NAME: ${{ inputs.change-name }}
          TASK_RANGE: ${{ inputs.task-range }}

      - name: Apply agent:active label to opened PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The claude-code-action will have created a branch and PR.
          # Find any PR from branches matching agent/<change-name>/* and apply the label.
          CHANGE_NAME="${{ inputs.change-name }}"
          PR_NUMBER=$(gh pr list \
            --head "agent/${CHANGE_NAME}" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            # Broader search: any open PR whose branch starts with agent/
            PR_NUMBER=$(gh pr list \
              --state open \
              --json number,headRefName \
              --jq ".[] | select(.headRefName | startswith(\"agent/${CHANGE_NAME}\")) | .number" \
              2>/dev/null | head -1 || true)
          fi

          if [ -n "$PR_NUMBER" ]; then
            echo "Applying agent:active label to PR #${PR_NUMBER}"
            gh pr edit "$PR_NUMBER" --add-label "agent:active" || \
              echo "Warning: could not apply agent:active label (label may not exist yet)"
          else
            echo "No PR found for change '${CHANGE_NAME}' — skipping label step"
          fi
